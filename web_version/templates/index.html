<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Handwritten Digit Recognizer</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
    background: #f4f4f4;
  }
  h1 {
    font-size: 24px;
  }
  #canvas {
    border: 2px solid #333;
    background: white;
    cursor: crosshair;
    touch-action: none;
  }
  .buttons {
    margin-top: 15px;
  }
  button {
    font-size: 16px;
    padding: 8px 20px;
    margin: 0 8px;
    cursor: pointer;
  }
  #result {
    margin-top: 20px;
    font-size: 28px;
    font-weight: bold;
    min-height: 40px;
  }
</style>
</head>
<body>
  <h1>Handwritten Digit Recognizer</h1>
  <canvas id="canvas" width="280" height="280"></canvas>
  <div class="buttons">
    <button id="predictBtn">Predict</button>
    <button id="clearBtn">Clear</button>
  </div>
  <div id="result">Draw a digit (0-9)</div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const resultDiv = document.getElementById("result");

    // White background, black strokes (server inverts colors for MNIST format)
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.lineWidth = 16;
    ctx.lineCap = "round";
    ctx.strokeStyle = "black";

    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;

    function getPos(event) {
      const rect = canvas.getBoundingClientRect();
      if (event.touches && event.touches.length > 0) {
        return {
          x: event.touches[0].clientX - rect.left,
          y: event.touches[0].clientY - rect.top,
        };
      }
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    }

    function startDraw(event) {
      isDrawing = true;
      const pos = getPos(event);
      lastX = pos.x;
      lastY = pos.y;
    }

    function draw(event) {
      if (!isDrawing) return;
      event.preventDefault();
      const pos = getPos(event);
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      lastX = pos.x;
      lastY = pos.y;
    }

    function stopDraw() {
      isDrawing = false;
    }

    canvas.addEventListener("mousedown", startDraw);
    canvas.addEventListener("mousemove", draw);
    canvas.addEventListener("mouseup", stopDraw);
    canvas.addEventListener("mouseleave", stopDraw);

    canvas.addEventListener("touchstart", startDraw);
    canvas.addEventListener("touchmove", draw);
    canvas.addEventListener("touchend", stopDraw);

    document.getElementById("clearBtn").addEventListener("click", () => {
      ctx.fillStyle = "white";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      resultDiv.textContent = "Draw a digit (0-9)";
    });

    document.getElementById("predictBtn").addEventListener("click", async () => {
      const imageData = canvas.toDataURL("image/png");
      resultDiv.textContent = "Predicting...";

      try {
        const response = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: imageData }),
        });
        const result = await response.json();

        if (result.error) {
          resultDiv.textContent = result.error;
        } else {
          resultDiv.textContent = `Prediction: ${result.digit} (${result.confidence}%)`;
        }
      } catch (err) {
        resultDiv.textContent = "Error connecting to server";
      }
    });
  </script>
</body>
</html>
